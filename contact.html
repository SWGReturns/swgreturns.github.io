<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SWGReturns | Contact</title>
  <meta name="description" content="Contact SWGReturns support and community staff.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer">
  <link rel="icon" href="https://swgtalon.online/assets/logo.png">
  <style>
    :root { --bg:#05070b; --panel:rgba(9,15,24,.92); --line:rgba(116,154,188,.24); --gold:#f2cb73; --blue:#5eb6ff; --text:#eef4ff; --muted:#9aaabc; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(90deg, rgba(5,7,11,.98), rgba(5,7,11,.72)), url("https://51-81-81-116.sslip.io/images/vaderdeathstar.jpg") center right / cover fixed no-repeat, var(--bg); color:var(--text); font-family:"Rajdhani","Segoe UI",Arial,sans-serif; font-size:17px; line-height:1.5; }
    .wrap { width:min(980px, calc(100% - 32px)); margin:0 auto; }
    .site-header { background:rgba(4,7,12,.94); border-bottom:1px solid rgba(242,203,115,.24); }
    .command-bar { min-height:76px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
    .brand { display:inline-flex; align-items:center; gap:12px; color:var(--text); text-decoration:none; font-family:"Orbitron",sans-serif; font-weight:900; text-transform:uppercase; }
    .brand img { width:46px; height:46px; object-fit:contain; filter:drop-shadow(0 0 14px rgba(94,182,255,.42)); }
    nav { display:flex; gap:7px; flex-wrap:wrap; }
    nav a, .btn { min-height:40px; display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 14px; border:1px solid var(--line); border-radius:6px; background:rgba(255,255,255,.045); color:#dbe8f8; text-decoration:none; text-transform:uppercase; font-size:13px; font-weight:800; letter-spacing:.05em; }
    nav a:hover, .btn:hover { border-color:rgba(242,203,115,.58); background:rgba(242,203,115,.10); }
    main { padding:70px 0; }
    .panel { max-width:760px; border:1px solid var(--line); background:var(--panel); border-radius:7px; padding:28px; box-shadow:0 22px 70px rgba(0,0,0,.36); }
    .kicker { color:var(--gold); font-family:"Orbitron",sans-serif; font-size:11px; font-weight:900; letter-spacing:.18em; text-transform:uppercase; }
    h1 { margin:12px 0 14px; font-family:"Orbitron",sans-serif; font-size:clamp(34px,6vw,58px); line-height:1.05; text-transform:uppercase; }
    p { color:#c5d1df; margin:0 0 18px; font-size:20px; }
    .actions { display:flex; flex-wrap:wrap; gap:12px; margin-top:22px; }
    .btn.primary { color:#0b0d11; background:linear-gradient(180deg,#ffe5a8,#d69b35); border-color:rgba(255,232,178,.85); }
    .btn.blue { color:#fff; background:linear-gradient(180deg,#377fc7,#194979); border-color:rgba(116,190,255,.55); }
    .small { color:var(--muted); font-size:15px; margin-top:18px; }
    @media (max-width:560px) { nav a, .btn { width:100%; } .command-bar { padding:12px 0; } main { padding:46px 0; } }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="wrap command-bar">
      <a class="brand" href="index.html"><img src="https://swgtalon.online/assets/logo.png" alt="SWGReturns logo">SWGReturns</a>
      <nav aria-label="Main navigation">
        <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
        <a href="download.html"><i class="fa-solid fa-download"></i> Downloads</a>
        <a href="core3-patch-notes.html"><i class="fa-solid fa-scroll"></i> Core3 Notes</a>
        <a href="nge-patch-notes.html"><i class="fa-solid fa-scroll"></i> NGE Notes</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    <section class="panel">
      <div class="kicker">Support channel</div>
      <h1>Contact Us</h1>
      <p>Use the live SWGReturns contact form for account help, launcher issues, bug reports, and server questions.</p>
      <div class="actions">
        <a class="btn primary" href="https://51-81-81-116.sslip.io/contact.html" target="_blank" rel="noopener"><i class="fa-solid fa-envelope"></i> Open Contact Form</a>
        <a class="btn blue" href="https://discord.gg/xY5WuwfcFD" target="_blank" rel="noopener"><i class="fa-brands fa-discord"></i> Core3 Discord</a>
        <a class="btn" href="https://discord.gg/6bH9Euw5R9" target="_blank" rel="noopener"><i class="fa-brands fa-discord"></i> NGE Discord</a>
      </div>
      <p class="small">Live form URL: https://51-81-81-116.sslip.io/contact.html</p>
    </section>
  </main>
</body>
</html>
