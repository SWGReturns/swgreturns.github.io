<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
    <h1>Player Count: <span id="count">--</span></h1>
    <p id="debug"></p>
    <script>
        async function update() {
            try {
                const r = await fetch('player_count.json?_=' + Date.now());
                const data = await r.json();
                document.getElementById('count').textContent = data.players || '0';
                document.getElementById('debug').textContent = 'Success: ' + JSON.stringify(data);
            } catch(e) {
                document.getElementById('debug').textContent = 'Error: ' + e.message;
            }
        }
        update();
        setInterval(update, 5000);
    </script>
</body>
</html>
