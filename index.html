<!DOCTYPE html>
<html>
<head>
    <title>SWG Returns - Live Player Count</title>
    <style>
        body {
            background: #0a0c12;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .box {
            background: #1a1c2a;
            border: 2px solid #3b82f6;
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
            min-width: 350px;
        }
        .title { font-size: 28px; color: #60a5fa; font-weight: bold; margin-bottom: 10px; }
        .status { font-size: 20px; margin-bottom: 15px; }
        .online { color: #4caf50; }
        .offline { color: #f44336; }
        .number { font-size: 80px; font-weight: bold; color: #93c5fd; margin: 10px 0; }
        .label { font-size: 18px; color: #888; }
        .detail { font-size: 14px; color: #666; margin-top: 10px; }
        .debug { font-size: 11px; color: #444; margin-top: 15px; word-break: break-all; }
        .green { color: #4caf50; }
    </style>
</head>
<body>
    <div class="box">
        <div class="title">🚀 SWG Returns</div>
        <div class="status online" id="status">● ONLINE</div>
        <div class="number" id="count">--</div>
        <div class="label">players online</div>
        <div class="detail">Peak: <span id="peak">--</span> · Uptime: <span id="uptime">N/A</span></div>
        <div class="debug" id="debug">Loading...</div>
    </div>

    <script>
        async function update() {
            const url = 'player_count.json?_=' + Date.now();
            const debug = document.getElementById('debug');
            
            try {
                const response = await fetch(url);
                debug.textContent = 'Fetch: ' + url + ' | Status: ' + response.status;
                
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status);
                }
                
                const data = await response.json();
                debug.textContent += ' | Data: ' + JSON.stringify(data);
                
                document.getElementById('count').textContent = data.players || '0';
                document.getElementById('peak').textContent = data.peak || 'N/A';
                document.getElementById('uptime').textContent = data.uptime || 'N/A';
                
                const statusEl = document.getElementById('status');
                if (data.online) {
                    statusEl.textContent = '● ONLINE';
                    statusEl.className = 'status online';
                } else {
                    statusEl.textContent = '○ OFFLINE';
                    statusEl.className = 'status offline';
                }
                
            } catch (error) {
                debug.textContent = 'ERROR: ' + error.message;
                document.getElementById('count').textContent = '?';
            }
        }
        
        update();
        setInterval(update, 10000);
    </script>
</body>
</html>
