cat > /var/www/html/index.html << 'EOF'
<!DOCTYPE html>
<html>
<head>
    <title>SWG Returns</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c12;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1a1c2a;
            border: 2px solid #3b82f6;
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
            min-width: 350px;
        }
        .title { font-size: 24px; color: #60a5fa; font-weight: bold; margin-bottom: 10px; }
        .status { font-size: 20px; margin-bottom: 15px; color: #4caf50; }
        .number { font-size: 80px; font-weight: bold; color: #93c5fd; }
        .label { font-size: 18px; color: #888; }
        .detail { font-size: 14px; color: #666; margin-top: 10px; }
        .updated { font-size: 12px; color: #444; margin-top: 15px; }
        .debug { font-size: 11px; color: #333; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">🚀 SWG Returns</div>
        <div class="status">● ONLINE</div>
        <div class="number" id="count">--</div>
        <div class="label">players online</div>
        <div class="detail">Peak: <span id="peak">--</span> · Uptime: N/A</div>
        <div class="updated" id="updated">Loading...</div>
        <div class="debug" id="debug"></div>
    </div>
    <script>
        async function update() {
            try {
                const r = await fetch('player_count.json?_=' + Date.now());
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const d = await r.json();
                document.getElementById('count').textContent = d.players || '0';
                document.getElementById('peak').textContent = d.peak || 'N/A';
                document.getElementById('updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
                document.getElementById('debug').textContent = 'Data: ' + JSON.stringify(d);
            } catch(e) {
                document.getElementById('debug').textContent = 'Error: ' + e.message;
                document.getElementById('updated').textContent = 'Error fetching data';
            }
        }
        update();
        setInterval(update, 10000);
    </script>
</body>
</html>
EOF
