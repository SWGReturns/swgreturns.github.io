<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forgot Password | SWGReturns</title>
<link rel="icon" href="https://swgtalon.online/assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" referrerpolicy="no-referrer">
<style>
:root{
  --bg:#010912;--panel:rgba(4,11,26,.96);--b0:rgba(40,85,160,.28);--b1:rgba(60,125,220,.5);
  --text:#c8e0ff;--muted:#a3bede;--gold:#ffc83a;--blue:#2a93ff;--green:#3de8a0;--red:#ff3d57;
  --fh:'Cinzel',Georgia,serif;--fb:'Inter','Segoe UI',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;
  background:linear-gradient(160deg,rgba(1,9,18,.9),rgba(2,4,20,.98)), url('images/vaderdeathstar.jpg') center/cover fixed;
  font-family:var(--fb);color:var(--text);
  display:flex;align-items:center;justify-content:center;
  padding:24px 16px;
}
.card{
  position:relative;z-index:1;max-width:440px;width:100%;
  background:var(--panel);border:1px solid var(--b0);border-radius:20px;padding:40px;
  backdrop-filter:blur(24px);box-shadow:0 32px 80px rgba(0,0,0,.7);
}
.brand{display:flex;align-items:center;gap:10px;font-family:var(--fh);font-size:13px;font-weight:900;letter-spacing:3px;color:var(--gold);margin-bottom:20px}
h1{font-family:var(--fh);font-size:22px;font-weight:900;color:#fff;margin-bottom:8px}
.sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}
.field{margin-bottom:18px}
.field label{display:block;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text);margin-bottom:8px}
.field input{width:100%;padding:13px 14px;background:rgba(3,10,24,.8);border:1px solid var(--b0);border-radius:9px;color:var(--text);font-size:16px;outline:none}
.field input:focus{border-color:var(--b1);box-shadow:0 0 0 3px rgba(42,147,255,.12)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:9px;width:100%;font-family:var(--fh);font-size:12px;font-weight:700;letter-spacing:.5px;border:1px solid transparent;text-decoration:none;cursor:pointer}
.btn-gold{background:linear-gradient(135deg,#ffe060,#ffaa00);color:#1a0d00;border-color:rgba(255,218,70,.5)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--text);border-color:var(--b0);margin-top:10px}
.msg-box{margin-top:16px;padding:13px 15px;border-radius:9px;font-size:13.5px;line-height:1.5;display:none}
.msg-box.show{display:block}
.msg-success{background:rgba(61,232,160,.1);border:1px solid rgba(61,232,160,.3);color:var(--green)}
.msg-error{background:rgba(255,61,87,.1);border:1px solid rgba(255,61,87,.3);color:var(--red)}
</style>
</head>
<body>
<div class="card">
  <div class="brand"><i class="fa-solid fa-jedi"></i> SWGReturns</div>
  <h1>Forgot Password</h1>
  <p class="sub">Enter your account username. If it has an email on file, we'll send a password reset link.</p>

  <form id="forgotForm">
    <div class="field">
      <label>Account Username</label>
      <input type="text" id="username" required placeholder="e.g. JediMaster99">
    </div>
    <button type="submit" class="btn btn-gold" id="submitBtn"><i class="fa-solid fa-paper-plane"></i> Send Reset Link</button>
    <a href="/" class="btn btn-ghost"><i class="fa-solid fa-house"></i> Back Home</a>
  </form>

  <div id="message" class="msg-box"></div>
</div>

<script>
const API_URL = 'https://51-81-81-116.sslip.io/api/reg/forgot-password';
const form = document.getElementById('forgotForm');
const messageEl = document.getElementById('message');
const btn = document.getElementById('submitBtn');

function showMessage(text, type) {
  messageEl.textContent = text;
  messageEl.className = 'msg-box show msg-' + type;
}

form.addEventListener('submit', async function(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  if (!username) return;

  btn.disabled = true;
  showMessage('Checking...', 'success');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username })
    });
    const data = await res.json();
    showMessage(data.message || 'If that account exists, a reset email has been sent.', 'success');
    form.reset();
  } catch (err) {
    showMessage('Could not reach the server. Please try again later.', 'error');
  } finally {
    btn.disabled = false;
  }
});
</script>
</body>
</html>
